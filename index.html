<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Z1 — Ventures by Sultan Al Noori</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Runic&display=swap" rel="stylesheet">
<style>
  :root { --cyan:#5fd0e6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:#04050a; }
  body { font-family:'Inter',-apple-system,sans-serif; color:#fff; }
  #c { position:fixed; inset:0; display:block; }

  .ui { position:fixed; inset:0; pointer-events:none; z-index:10; }
  header { position:absolute; top:26px; left:28px; }
  .eyebrow { font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.14em; color:var(--cyan); opacity:.9; }
  .title { font-size:clamp(34px,7vw,56px); font-weight:700; letter-spacing:-.02em; line-height:1; margin-top:6px; }
  .title b { color:#ff9d3c; }
  .sub { margin-top:7px; font-size:13px; color:rgba(255,255,255,.55); letter-spacing:.01em; }
  .pills { margin-top:16px; display:flex; flex-wrap:wrap; gap:8px; max-width:min(90vw,420px); }
  .pill { font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(255,255,255,.72);
          padding:6px 12px; border-radius:999px; background:rgba(255,255,255,.045);
          border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(3px); }
  .pill b { color:var(--cyan); font-weight:500; }
  .hint { position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
          font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.12em;
          text-transform:uppercase; color:rgba(255,255,255,.4); animation:floaty 2.8s ease-in-out infinite; }
  @keyframes floaty { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-5px);} }

  /* modal */
  #modal { position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
           opacity:0; pointer-events:none; transition:opacity .25s; }
  #modal.show { opacity:1; pointer-events:auto; }
  .backdrop { position:absolute; inset:0; background:rgba(3,4,10,.72); backdrop-filter:blur(4px); }
  .card { position:relative; width:min(420px,88vw); border-radius:18px; padding:26px 26px 22px;
          background:linear-gradient(180deg,rgba(20,24,42,.97),rgba(11,14,26,.98));
          border:1px solid rgba(255,255,255,.10); box-shadow:0 30px 80px -20px #000;
          transform:translateY(14px) scale(.97); transition:transform .28s cubic-bezier(.2,.9,.3,1.2); }
  #modal.show .card { transform:translateY(0) scale(1); }
  .card .x { position:absolute; top:12px; right:16px; background:none; border:0; color:rgba(255,255,255,.5);
             font-size:26px; line-height:1; cursor:pointer; }
  .card .x:hover { color:#fff; }
  .ptag { display:flex; align-items:center; gap:10px; }
  .swatch { width:13px; height:13px; border-radius:50%; }
  .pname { font-size:21px; font-weight:700; letter-spacing:-.01em; font-family:'Noto Sans Runic','Inter',sans-serif; }
  .pstatus { display:inline-block; margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:11px;
             font-weight:500; letter-spacing:.04em; text-transform:uppercase; padding:4px 10px; border-radius:999px; }
  .pdesc { margin-top:16px; font-size:14px; line-height:1.6; color:rgba(255,255,255,.8); }
  .pfoot { margin-top:18px; padding-top:14px; border-top:1px solid rgba(255,255,255,.08);
           font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(255,255,255,.42); }

  /* contact */
  .contact-btn { position:absolute; top:30px; right:30px; pointer-events:auto;
    font-family:'JetBrains Mono',monospace; font-size:12.5px; color:rgba(255,255,255,.82);
    padding:8px 16px; border-radius:999px; background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.18); cursor:pointer; backdrop-filter:blur(3px); letter-spacing:.04em; }
  .contact-btn:hover { background:rgba(255,255,255,.12); color:#fff; }
  .ui.hide { opacity:0; transition:opacity .5s; }
  #c { transition:transform 1.1s cubic-bezier(.55,0,.3,1), filter 1.1s; }
  #c.blurred { filter:blur(3px) brightness(.5); }
  .cmodal { position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .5s; }
  .cmodal.show { opacity:1; pointer-events:auto; }
  .cbackdrop { position:absolute; inset:0; background:rgba(4,5,12,.5); }
  .ccard { position:relative; width:min(460px,90vw); border-radius:20px; padding:30px 30px 26px;
    background:linear-gradient(180deg,rgba(20,24,42,.97),rgba(10,13,26,.98));
    border:1px solid rgba(255,255,255,.12); box-shadow:0 40px 100px -20px #000;
    transform:translateY(16px) scale(.95); transition:transform .5s cubic-bezier(.2,.9,.3,1.2); }
  .cmodal.show .ccard { transform:translateY(0) scale(1); }
  .ccard h3 { font-size:22px; font-weight:700; letter-spacing:-.01em; }
  .ccard .csub { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--cyan); margin-top:3px; letter-spacing:.04em; }
  .ccard label { display:block; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.05em;
    text-transform:uppercase; color:rgba(255,255,255,.5); margin:15px 0 6px; }
  .ccard input, .ccard textarea { width:100%; box-sizing:border-box; background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.14); border-radius:10px; padding:11px 13px; font-size:14px;
    color:#fff; font-family:'Inter',sans-serif; outline:none; transition:border-color .2s; }
  .ccard input:focus, .ccard textarea:focus { border-color:var(--cyan); }
  .ccard textarea { resize:vertical; min-height:92px; }
  .csend { margin-top:20px; width:100%; padding:13px; border:0; border-radius:10px;
    background:var(--cyan); color:#04121a; font-size:14px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; }
  .csend:hover { filter:brightness(1.08); } .csend:disabled { opacity:.6; cursor:default; }
  .cx { position:absolute; top:14px; right:18px; background:none; border:0; color:rgba(255,255,255,.5); font-size:26px; line-height:1; cursor:pointer; }
  .cx:hover { color:#fff; }
  .cmsg { margin-top:14px; font-size:13px; text-align:center; min-height:18px; }

  /* hover preview card */
  #hovercard { position:fixed; z-index:35; pointer-events:none; opacity:0; transition:opacity .15s;
    background:linear-gradient(180deg,rgba(20,24,42,.96),rgba(11,14,26,.97));
    border:1px solid rgba(255,255,255,.14); border-radius:12px; padding:11px 14px; width:210px;
    box-shadow:0 20px 50px -15px #000; }
  #hovercard.show { opacity:1; }
  #hovercard .hname { font-size:14px; font-weight:700; letter-spacing:-.01em; font-family:'Noto Sans Runic','Inter',sans-serif; }
  #hovercard .hstatus { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.04em; text-transform:uppercase; margin-top:5px; }
  #hovercard .hfoot { font-size:11.5px; color:rgba(255,255,255,.62); margin-top:7px; line-height:1.4; }

  /* secret Command Center star */
  #ccStar.cc-secret { position:fixed; top:120px; right:120px; z-index:30; cursor:pointer;
    font-size:16px; color:rgba(175,228,250,.7); text-shadow:0 0 10px rgba(130,215,245,.8);
    pointer-events:auto; animation:ccTwinkle 2.8s ease-in-out infinite; transition:color .25s, text-shadow .25s, transform .25s; }
  #ccStar.cc-secret:hover { color:#eaf9ff; text-shadow:0 0 22px rgba(160,225,250,1); transform:scale(1.4); }
  @keyframes ccTwinkle { 0%,100% { opacity:.5; } 50% { opacity:1; } }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ccStar" class="cc-secret" aria-label="Command Center">&#10022;</div>

  <div class="ui">
    <header>
      <div class="eyebrow">Z1 // VENTURE GROUP</div>
      <div class="title">Z1</div>
      <div class="sub">Ventures by Sultan Al Noori</div>
      <div class="pills">
        <span class="pill"><b>6</b> ventures</span>
        <span class="pill"><b>3</b> live &middot; <b>3</b> building</span>
        <span class="pill">Dubai &middot; UAE</span>
      </div>
    </header>
    <div class="hint">&#9702; tap a planet to explore</div>
    <button class="contact-btn" id="contactBtn">Contact</button>
  </div>

  <div id="modal">
    <div class="backdrop"></div>
    <div class="card">
      <button class="x" aria-label="Close">&times;</button>
      <div class="ptag"><span class="swatch"></span><span class="pname"></span></div>
      <div class="pstatus"></div>
      <p class="pdesc"></p>
      <div class="pfoot"></div>
    </div>
  </div>

  <div id="hovercard"><div class="hname"></div><div class="hstatus"></div><div class="hfoot"></div></div>

  <div class="cmodal" id="cmodal">
    <div class="cbackdrop"></div>
    <div class="ccard">
      <button class="cx" id="cClose" aria-label="Close">&times;</button>
      <h3>Get in touch</h3>
      <div class="csub">Z1 // let's talk</div>
      <form id="cForm">
        <label>Your email</label>
        <input type="email" name="email" required placeholder="you@example.com" autocomplete="email">
        <label>Subject</label>
        <input type="text" name="subject" required placeholder="What's this about?">
        <label>Message</label>
        <textarea name="message" required placeholder="Your message..."></textarea>
        <!-- honeypot: real people never fill this; bots do → we drop it -->
        <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">
        <button type="submit" class="csend" id="cSend">Send message</button>
        <div class="cmsg" id="cMsg"></div>
      </form>
    </div>
  </div>

<script>
  // Masked ventures carry NO real name/description in the page source — only a
  // partial hint + a generic stealth blurb. Live ones are shown in full.
  const STEALTH = 'Something is taking shape in the Z1 orbit — details are under wraps until it launches.';
  const UNDISCLOSED = '🔒 Undisclosed venture';
  const VENTURES = [
    { name:'Mᚨᚱᛁi',            color:'#a8e06a', rf:0.20, spd:0.090, a0:0.4, masked:true, status:'In stealth',
      desc:STEALTH, foot:UNDISCLOSED },
    { name:'Aᚱᛟo Tᛞᚨᚲᛁᚱg',      color:'#8b7cf6', rf:0.26, spd:0.070, a0:2.1, masked:true, status:'In stealth',
      desc:STEALTH, foot:UNDISCLOSED },
    { name:'Z1 Enterprise',    color:'#e0a458', rf:0.32, spd:0.055, a0:3.7, status:'Live',
      desc:'A general trading company — starting with Airsoft supplies and growing into a broader, higher-value product catalog.', foot:'General trading' },
    { name:'xᚦᚱᛟᚨt',           color:'#5aa9e6', rf:0.37, spd:0.045, a0:5.2, masked:true, status:'In stealth',
      desc:STEALTH, foot:UNDISCLOSED },
    { name:'FARM2DOOR',        color:'#e6c84f', rf:0.42, spd:0.037, a0:1.2, status:'Operating',
      desc:'Premium free-range eggs with reliable supply and a growing base of recurring customers across the UAE.', foot:'Food · direct-to-door' },
    { name:'Z1 Cᚱᛟᚨᚲᛁd Cᚱᛟᚨᛁr', color:'#4aa3ff', rf:0.47, spd:0.030, a0:4.5, masked:true, status:'In stealth',
      desc:STEALTH, foot:UNDISCLOSED },
  ];

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const modal = document.getElementById('modal');
  const TILT = 0.42;   // sin(camera elevation): vertical squash of the ecliptic plane
  const COSZ = 0.90;   // cos(camera elevation): how out-of-plane height maps to screen-Y

  let W, H, dpr, cx, cy, minDim, sunR, dotR, off, stars = [], asteroids = [], planetPos = [];

  function makeStars(){
    stars = [];
    const n = Math.round(Math.min(420, W * H / 2400));
    for (let i = 0; i < n; i++){
      const roll = Math.random();
      let c;
      if (roll < 0.44)      c = ['#4fd6f2','#63e2ff','#37c8e8'][(Math.random()*3)|0]; // cyan
      else if (roll < 0.70) c = ['#ffffff','#dff2ff','#eaf6ff'][(Math.random()*3)|0]; // white
      else                  c = ['#ff9a4d','#ffb469','#ff8636'][(Math.random()*3)|0]; // orange
      stars.push({ x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*Math.random()*2.0 + 0.5, c,
        ph: Math.random()*6.2832, sp: Math.random()*1.6 + 0.4 });
    }
  }

  function makeAsteroids(){
    asteroids = [];
    const n = Math.round(Math.min(8500, W*H/58));
    const refR = 0.3*minDim, maxD = Math.max(W, H), span = 0.90*maxD;
    for (let i = 0; i < n; i++){
      const a = 0.08*minDim + Math.pow(Math.random(), 0.75)*span;  // more objects further out
      const rn = Math.min(1, a/span);
      const distBr = Math.max(0.20, Math.pow(1 - rn*0.80, 1.5));    // brightness fades from the center
      const inc = rn*(0.10 + Math.random()*0.60), node = Math.random()*6.2832; // inner flat/ordered, outer chaotic
      const e = rn*Math.random()*0.55;
      const cyan = Math.random() < 0.5;
      const roll = Math.random();
      let sz, base, hero = false;
      if (roll < 0.03){ sz = 2.2 + Math.random()*1.8; base = 1.0; hero = true; }
      else if (roll < 0.22){ sz = 1.6 + Math.random()*0.9; base = 0.80; }
      else { sz = 1.05 + Math.random()*0.6; base = 0.62; }
      asteroids.push({ a, e, argp: Math.random()*6.2832,
        cI: Math.cos(inc), sI: Math.sin(inc), cN: Math.cos(node), sN: Math.sin(node),
        m0: Math.random()*6.2832, spd: 0.10*Math.pow(refR/a, 1.5),  // further = slower (real orbital physics)
        sz, br: base*distBr, hero, hue: cyan ? (188 + Math.random()*14) : (4 + Math.random()*16) });
    }
  }

  function buildSwarm(){
    off = document.createElement('canvas');
    off.width = W*dpr; off.height = H*dpr;
    const o = off.getContext('2d');
    o.setTransform(dpr,0,0,dpr,0,0);
    // warm central glow
    const g = o.createRadialGradient(cx, cy, 0, cx, cy, minDim*0.95);
    g.addColorStop(0, 'rgba(240,110,70,0.20)');
    g.addColorStop(0.4, 'rgba(225,80,55,0.07)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    o.fillStyle = g; o.fillRect(0,0,W,H);
    // glowing belt/ring in the ecliptic plane (the bright "wavy ring" of the reference)
    o.globalCompositeOperation = 'lighter';
    {
      const rr = 0.40*minDim;
      for (let L = 0; L < 8; L++){
        o.beginPath();
        o.ellipse(cx, cy, rr, rr*TILT, 0, 0, 6.2832);
        o.strokeStyle = `rgba(235,85,55,${(0.06 - L*0.006).toFixed(3)})`;
        o.lineWidth = 6 + L*16;
        o.stroke();
      }
    }
    // the swarm of orbit trails — fine, dense 3D weave that fills the frame
    o.lineWidth = 0.5;
    const N = Math.round(Math.min(7000, W*H/95));
    const SEG = 60;
    const maxD = Math.max(W, H);
    for (let i = 0; i < N; i++){
      const a = 0.08*minDim + Math.pow(Math.random(), 0.75)*0.90*maxD;
      const rn = Math.min(1, a/(0.90*maxD));
      const e = rn*Math.random()*0.55;
      const argp = Math.random()*6.2832, inc = rn*(0.10 + Math.random()*0.60), node = Math.random()*6.2832;
      const cI = Math.cos(inc), sI = Math.sin(inc), cN = Math.cos(node), sN = Math.sin(node);
      const cyan = Math.random() < 0.40;
      const hue = cyan ? (186 + Math.random()*16) : (2 + Math.random()*18);
      const al = (0.03 + Math.random()*0.05) * Math.max(0.15, Math.pow(1 - rn*0.85, 1.4));
      o.strokeStyle = `hsla(${hue},92%,60%,${al})`;
      o.beginPath();
      for (let s = 0; s <= SEG; s++){
        const f = (s/SEG)*6.2832;
        const r = a*(1-e*e)/(1+e*Math.cos(f));
        const u = f + argp;
        const X = r*Math.cos(u), Y = r*Math.sin(u);
        const y1 = Y*cI, z1 = Y*sI;
        const X2 = X*cN - y1*sN, Y2 = X*sN + y1*cN;
        const sx = cx + X2, sy = cy + Y2*TILT - z1*COSZ;
        if (s === 0) o.moveTo(sx, sy); else o.lineTo(sx, sy);
      }
      o.stroke();
    }
    o.globalCompositeOperation = 'source-over';
  }

  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cx = W/2; cy = H*0.55; minDim = Math.min(W,H);
    sunR = Math.max(3, minDim*0.014); dotR = Math.max(2, minDim*0.0048);
    makeStars(); makeAsteroids(); buildSwarm();
  }
  window.addEventListener('resize', resize);

  function frame(t){
    ctx.clearRect(0,0,W,H);
    if (off) ctx.drawImage(off, 0, 0, W, H);

    // stars — cyan/orange, glowing (halo + core, additive)
    ctx.globalCompositeOperation = 'lighter';
    for (const s of stars){
      const a = 0.40 + 0.55*Math.abs(Math.sin(t*0.001*s.sp + s.ph));
      ctx.fillStyle = s.c;
      ctx.globalAlpha = a*0.26;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r*2.6, 0, 6.2832); ctx.fill();
      ctx.globalAlpha = a;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.2832); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    // asteroid swarm — thousands of moving objects (3D)
    ctx.globalCompositeOperation = 'lighter';
    for (const k of asteroids){
      const m = k.m0 - (t/1000)*k.spd;
      const f = m + 2*k.e*Math.sin(m);
      const r = k.a*(1-k.e*k.e)/(1+k.e*Math.cos(f));
      const u = f + k.argp;
      const X = r*Math.cos(u), Y = r*Math.sin(u);
      const y1 = Y*k.cI, z1 = Y*k.sI;
      const X2 = X*k.cN - y1*k.sN, Y2 = X*k.sN + y1*k.cN;
      const sx = cx + X2, sy = cy + Y2*TILT - z1*COSZ;
      if (k.sz >= 1.45){
        ctx.fillStyle = `hsla(${k.hue},95%,${k.hero?74:65}%,${k.br})`;
        ctx.beginPath(); ctx.arc(sx, sy, k.sz*0.7, 0, 6.2832); ctx.fill();
      } else {
        ctx.fillStyle = `hsla(${k.hue},92%,63%,${k.br})`;
        ctx.fillRect(sx, sy, k.sz, k.sz);
      }
    }
    ctx.globalCompositeOperation = 'source-over';

    // planet orbit rings
    for (const v of VENTURES){
      const r = v.rf*minDim;
      ctx.beginPath();
      ctx.ellipse(cx, cy, r, r*TILT, 0, 0, 6.2832);
      ctx.strokeStyle = 'rgba(255,255,255,0.09)'; ctx.lineWidth = 1; ctx.stroke();
    }

    // planets
    planetPos = [];
    for (const v of VENTURES){
      const r = v.rf*minDim;
      const ang = v.a0 - (t/1000)*v.spd;
      const x = cx + Math.cos(ang)*r;
      const y = cy + Math.sin(ang)*r*TILT;
      ctx.globalCompositeOperation = 'lighter';
      const g = ctx.createRadialGradient(x, y, 0, x, y, dotR*4);
      g.addColorStop(0, v.color + 'cc'); g.addColorStop(1, v.color + '00');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, dotR*4, 0, 6.2832); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = v.color; ctx.beginPath(); ctx.arc(x, y, dotR, 0, 6.2832); ctx.fill();
      ctx.font = "400 10px 'Noto Sans Runic', 'JetBrains Mono', monospace";
      ctx.fillStyle = 'rgba(255,255,255,0.34)';
      ctx.fillText(v.name, x + dotR + 6, y + 3);
      planetPos.push({ v, x, y });
    }

    // sun
    ctx.globalCompositeOperation = 'lighter';
    const pr = sunR * (1 + 0.07*Math.sin(t*0.0022));
    let halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, pr*9);
    halo.addColorStop(0, 'rgba(255,225,160,0.45)');
    halo.addColorStop(0.18,'rgba(255,150,60,0.22)');
    halo.addColorStop(1, 'rgba(255,90,40,0)');
    ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(cx, cy, pr*9, 0, 6.2832); ctx.fill();
    let core = ctx.createRadialGradient(cx, cy, 0, cx, cy, pr*1.6);
    core.addColorStop(0, '#ffffff'); core.addColorStop(0.5, '#ffe6b0'); core.addColorStop(1, 'rgba(255,170,80,0.15)');
    ctx.fillStyle = core; ctx.beginPath(); ctx.arc(cx, cy, pr*1.6, 0, 6.2832); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    requestAnimationFrame(frame);
  }

  // interaction
  function openModal(v){
    modal.querySelector('.swatch').style.background = v.color;
    modal.querySelector('.swatch').style.boxShadow = '0 0 14px ' + v.color;
    modal.querySelector('.pname').textContent = v.name;
    const st = modal.querySelector('.pstatus');
    st.textContent = v.status; st.style.color = v.color;
    st.style.background = v.color + '22'; st.style.border = '1px solid ' + v.color + '55';
    modal.querySelector('.pdesc').textContent = v.desc;
    modal.querySelector('.pfoot').textContent = v.foot;
    modal.classList.add('show');
  }
  function closeModal(){ modal.classList.remove('show'); }
  modal.querySelector('.x').addEventListener('click', closeModal);
  modal.querySelector('.backdrop').addEventListener('click', closeModal);
  window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let best = null, bd = 1e9;
    for (const p of planetPos){ const d = Math.hypot(p.x-mx, p.y-my); if (d < bd){ bd = d; best = p; } }
    if (best && bd < 34) openModal(best.v);
  });

  // ── Hover preview card (desktop) ────────────────────────
  const hc = document.getElementById('hovercard');
  const SUN_INFO = { name: 'Z1 Group', color: '#ffd27a', status: 'Venture Group',
    foot: 'The group behind every venture — Sultan Al Noori.' };
  let hoverKey = null;
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let info = null, key = null;
    if (Math.hypot(cx - mx, cy - my) < Math.max(30, sunR*3)){ info = SUN_INFO; key = 'sun'; }
    else {
      let best = null, bd = 1e9;
      for (const p of planetPos){ const d = Math.hypot(p.x-mx, p.y-my); if (d < bd){ bd = d; best = p; } }
      if (best && bd < 30){ info = best.v; key = best.v.name; }
    }
    if (info){
      if (hoverKey !== key){
        hoverKey = key;
        const nm = hc.querySelector('.hname'); nm.textContent = info.name; nm.style.color = info.color;
        const st = hc.querySelector('.hstatus'); st.textContent = info.status; st.style.color = info.color;
        hc.querySelector('.hfoot').textContent = info.foot;
      }
      let lx = e.clientX + 16, ly = e.clientY + 16;
      if (lx + 226 > window.innerWidth) lx = e.clientX - 226;
      if (ly + 104 > window.innerHeight) ly = e.clientY - 104;
      hc.style.left = lx + 'px'; hc.style.top = ly + 'px';
      hc.classList.add('show'); canvas.style.cursor = 'pointer';
    } else {
      hoverKey = null; hc.classList.remove('show'); canvas.style.cursor = 'default';
    }
  });

  // ── Contact ─────────────────────────────────────────────
  const cmodal = document.getElementById('cmodal');
  const ui = document.querySelector('.ui');
  function openContact(){
    const p = planetPos[3] || planetPos[0];
    if (p){ canvas.style.transformOrigin = p.x + 'px ' + p.y + 'px'; }
    canvas.style.transform = 'scale(2.6)';
    canvas.classList.add('blurred');
    ui.classList.add('hide');
    setTimeout(() => cmodal.classList.add('show'), 620);
  }
  function closeContact(){
    cmodal.classList.remove('show');
    canvas.style.transform = '';
    canvas.classList.remove('blurred');
    ui.classList.remove('hide');
  }
  document.getElementById('contactBtn').addEventListener('click', openContact);
  document.getElementById('cClose').addEventListener('click', closeContact);
  cmodal.querySelector('.cbackdrop').addEventListener('click', closeContact);
  window.addEventListener('keydown', e => { if (e.key === 'Escape') closeContact(); });

  const cForm = document.getElementById('cForm'), cMsg = document.getElementById('cMsg'), cSend = document.getElementById('cSend');
  cForm.addEventListener('submit', async e => {
    e.preventDefault();
    cSend.disabled = true; cMsg.style.color = 'rgba(255,255,255,.6)'; cMsg.textContent = 'Sending…';
    try {
      const data = Object.fromEntries(new FormData(cForm));
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST', headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          access_key: '76d725a0-1ab3-4a8d-b77b-f7d6fa8379d6',
          subject: 'New z1.ae contact: ' + (data.subject || '(no subject)'),
          from_name: 'z1.ae contact form',
          ...data
        })
      });
      const json = await res.json();
      if (!json.success) throw new Error();
      cMsg.style.color = '#7fe0a0'; cMsg.textContent = 'Message sent — thank you!';
      cForm.reset();
    } catch {
      cMsg.style.color = '#f2668b'; cMsg.textContent = 'Could not send — please email sultan@z1.ae directly.';
    } finally { cSend.disabled = false; }
  });

  // secret Command Center star
  const ccStar = document.getElementById('ccStar');
  if (ccStar) ccStar.addEventListener('click', () =>
    window.open('https://command.z1.ae', '_blank', 'noopener'));

  resize();
  requestAnimationFrame(frame);
</script>
</body>
</html>
